<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Assassin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron,sans-serif;
  color:#eaffff;
  background:#07141a;
  overflow-x:hidden;
}

/* cinematic background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,210,0.25), transparent 50%),
    radial-gradient(circle at 80% 30%, rgba(0,140,255,0.25), transparent 55%),
    radial-gradient(circle at 50% 80%, rgba(255,0,120,0.15), transparent 60%);
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:50px 50px;
  opacity:0.12;
  z-index:-1;
}

.container{
  max-width:850px;
  margin:auto;
  padding:18px;
}

.header{
  text-align:center;
  margin:10px 0 18px;
}

.header h1{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.7;
}

.header h2{
  font-size:22px;
  color:#00ffd0;
  text-shadow:0 0 12px rgba(0,255,200,0.5);
}

.panel{
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,210,0.2);
  border-radius:16px;
  padding:16px;
  margin:12px 0;
}

.big{
  font-size:54px;
  text-align:center;
  color:#00ffd0;
  text-shadow:0 0 15px rgba(0,255,210,0.5);
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

.card{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
}

.name{
  display:flex;
  gap:10px;
  align-items:center;
  font-size:15px;
}

.tag{
  font-size:11px;
  padding:2px 8px;
  border-radius:6px;
  background:rgba(0,255,210,0.15);
  border:1px solid rgba(0,255,210,0.3);
}

.kills{
  color:#00ffd0;
  font-size:18px;
}

.signature{
  text-align:center;
  margin-top:20px;
  font-size:10px;
  opacity:0.35;
  letter-spacing:3px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>GRADE 9 SENIOR ASSASSIN</h1>
    <h2>LIVE BOARD</h2>
  </div>

  <div class="panel">
    <div class="big" id="status"></div>
    <div class="sub" id="substatus"></div>
  </div>

  <div class="panel" id="board"></div>

  <div class="signature">© Vrishab Varun</div>

</div>

<script>

/* =========================
   EASY EDIT ZONE
========================= */

const TOTAL_PLAYERS = 38;
const REMAINING_PLAYERS = 11;

const players = [
  { name:"Dante Larizza", kills:9 },
  { name:"Adriel Callangan", kills:7 },
  { name:"Vrishab Varun", kills:6 },
  { name:"Player 4", kills:3 },
  { name:"Player 5", kills:2 }
];

/* ========================= */

const board = document.getElementById("board");
const status = document.getElementById("status");
const substatus = document.getElementById("substatus");

function render(){

  const top3 = [...players]
    .sort((a,b)=>b.kills-a.kills)
    .slice(0,3);

  status.innerText = `${REMAINING_PLAYERS} REMAIN / ${TOTAL_PLAYERS}`;
  substatus.innerText = "ACTIVE ASSASSINS";

  const labels = ["🥇 TOP 1", "🥈 TOP 2", "🥉 TOP 3"];

  board.innerHTML = "";

  top3.forEach((p,i)=>{
    board.innerHTML += `
      <div class="card">
        <div class="name">
          <span class="tag">${labels[i]}</span>
          ${p.name}
        </div>
        <div class="kills">${p.kills} ELIMS</div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
