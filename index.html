<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Assassin // Live Board</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron,sans-serif;
  color:#eaffff;
  overflow-x:hidden;
  background:#06131a;
}

/* 🌌 LAYERED ATMOSPHERE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(0,255,220,0.28), transparent 45%),
    radial-gradient(circle at 85% 30%, rgba(0,140,255,0.25), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,0,120,0.15), transparent 55%);
  filter: blur(18px);
  animation: drift 10s ease-in-out infinite alternate;
  z-index:-3;
}

/* 🌐 GRID */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size:52px 52px;
  opacity:0.16;
  animation: gridMove 12s linear infinite;
  z-index:-2;
}

/* 🧠 SCAN LINE (CINEMATIC MOTION) */
.scan{
  position:fixed;
  inset:-50%;
  background:linear-gradient(to bottom,
    transparent,
    rgba(0,255,220,0.08),
    transparent);
  transform:rotate(10deg);
  animation: scanMove 6s linear infinite;
  z-index:-1;
  pointer-events:none;
}

/* VIGNETTE */
.vignette{
  position:fixed;
  inset:0;
  box-shadow:inset 0 0 240px rgba(0,0,0,0.85);
  z-index:0;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:18px;
  position:relative;
  z-index:1;
  animation: fadeIn 1s ease-out;
}

/* HEADER */
.header{
  text-align:center;
  margin:10px 0 18px;
}

.header h1{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.7;
}

.header h2{
  font-size:22px;
  color:#00ffd0;
  text-shadow:0 0 18px rgba(0,255,200,0.7);
}

/* STATUS PANEL */
.panel{
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(0,255,220,0.18);
  border-radius:18px;
  padding:16px;
  margin:12px 0;
  backdrop-filter:blur(20px);
  box-shadow:0 0 30px rgba(0,255,220,0.08);
  animation: popIn 0.8s ease-out;
}

/* BIG STATUS */
.big{
  font-size:58px;
  text-align:center;
  color:#00ffd0;
  text-shadow:0 0 25px #00ffd0;
}

.subtext{
  text-align:center;
  font-size:12px;
  opacity:0.7;
  letter-spacing:2px;
  margin-top:6px;
}

/* BOARD */
.grid{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* TOP 3 CARDS */
.card{
  padding:14px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 40px rgba(0,255,220,0.25);
  border-color:rgba(0,255,220,0.35);
}

/* NAME */
.name{
  font-size:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* KILLS */
.kills{
  font-size:18px;
  color:#00ffd0;
  text-shadow:0 0 12px rgba(0,255,220,0.5);
}

/* 🏆 CLEAR TOP 3 LABELS */
.rank{
  font-size:12px;
  padding:2px 8px;
  border-radius:6px;
  background:rgba(0,255,220,0.15);
  border:1px solid rgba(0,255,220,0.4);
}

/* SIGNATURE */
.signature{
  text-align:center;
  margin-top:20px;
  font-size:10px;
  opacity:0.35;
  letter-spacing:4px;
}

/* ANIMATIONS */
@keyframes drift{
  0%{ transform:translateY(-2%) scale(1.05); }
  100%{ transform:translateY(2%) scale(1.1); }
}

@keyframes gridMove{
  0%{ transform:translateY(0); }
  100%{ transform:translateY(52px); }
}

@keyframes scanMove{
  0%{ transform:translateY(-30%) rotate(10deg); }
  100%{ transform:translateY(30%) rotate(10deg); }
}

@keyframes fadeIn{
  from{ opacity:0; transform:scale(0.98); }
  to{ opacity:1; transform:scale(1); }
}

@keyframes popIn{
  from{ opacity:0; transform:translateY(10px); }
  to{ opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<div class="vignette"></div>
<div class="scan"></div>

<div class="container">

  <div class="header">
    <h1>GRADE 9 SENIOR ASSASSIN</h1>
    <h2>LIVE BOARD</h2>
  </div>

  <div class="panel">
    <div class="big" id="remaining"></div>
    <div class="subtext" id="context"></div>
  </div>

  <div class="panel">
    <div class="grid" id="board"></div>
  </div>

  <div class="signature">© Vrishab Varun — system build</div>

</div>

<script>

const TOTAL_PLAYERS = 38;

const players = [
  { name:"Dante Larizza", kills:9 },
  { name:"Adriel Callangan", kills:7 },
  { name:"Vrishab Varun", kills:6 },
  { name:"Player 4", kills:3 },
  { name:"Player 5", kills:2 }
];

const board = document.getElementById("board");
const remaining = document.getElementById("remaining");
const context = document.getElementById("context");

/* RENDER */
function render(){
  const top3 = [...players]
    .sort((a,b)=>b.kills-a.kills)
    .slice(0,3);

  const medals = ["🥇 TOP 1", "🥈 TOP 2", "🥉 TOP 3"];

  board.innerHTML = "";

  top3.forEach((p,i)=>{
    board.innerHTML += `
      <div class="card">
        <div class="name">
          <span class="rank">${medals[i]}</span>
          ${p.name}
        </div>
        <div class="kills">${p.kills}</div>
      </div>
    `;
  });

  const remainingCount = TOTAL_PLAYERS - players.length;

  remaining.innerText = `${remainingCount} / ${TOTAL_PLAYERS}`;
  context.innerText = "ASSASSINS ACTIVE";
}

render();

</script>

</body>
</html>
