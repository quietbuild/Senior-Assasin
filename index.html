        <div class="name">

          <span class="tag">
            ${labels[index]}
          </span>

          <span>
            ${player.name}
          </span>

          ${statusBadge}

        </div>

        <div class="kills">
          ${player.kills} ELIMS
        </div>

      </div>
    `;

  });

}

status.innerText =
  `${REMAINING_PLAYERS} / ${TOTAL_PLAYERS}`;

renderLeaderboard();
renderBounties();

</script>

</body>
</html>
